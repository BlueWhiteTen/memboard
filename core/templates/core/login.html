<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memboard – Sign in</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--cream:#F7F3EC;--warm-white:#FDFAF5;--ink:#2C2417;--ink-light:#6B5E4A;--amber:#C97B2A;--amber-pale:#F5E8D0;--border:rgba(44,36,23,0.15);--border-strong:rgba(44,36,23,0.28);}
        body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(circle at 20% 20%,rgba(201,123,42,0.07) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(201,123,42,0.04) 0%,transparent 50%);}
        .wrap{width:100%;max-width:420px;padding:1.5rem;}
        .logo-area{text-align:center;margin-bottom:2.5rem;}
        .logo-icon{width:52px;height:52px;background:var(--ink);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem;}
        .logo-icon svg{width:28px;height:28px;}
        .logo-area h1{font-family:'Lora',serif;font-size:1.9rem;font-weight:600;color:var(--ink);letter-spacing:-0.02em;}
        .logo-area p{font-size:0.875rem;color:var(--ink-light);margin-top:0.3rem;font-weight:300;}
        .card{background:var(--warm-white);border:1px solid var(--border);border-radius:18px;padding:2rem;box-shadow:0 2px 24px rgba(44,36,23,0.06);}
        .card h2{font-family:'Lora',serif;font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:1.5rem;}
        .field{margin-bottom:1rem;}
        .field label{display:block;font-size:0.78rem;font-weight:500;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem;}
        .field input{width:100%;height:44px;border:1px solid var(--border-strong);border-radius:10px;padding:0 0.9rem;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--ink);background:var(--cream);outline:none;transition:border-color 0.15s,box-shadow 0.15s;}
        .field input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(201,123,42,0.12);}
        .field input::placeholder{color:rgba(107,94,74,0.4);}
        .error-msg{background:#FCEAEA;border:1px solid #D48A8A;border-radius:8px;padding:0.6rem 0.9rem;margin-bottom:1rem;color:#6B1A1A;font-size:0.875rem;}
        .btn{width:100%;height:46px;background:var(--ink);color:var(--warm-white);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:0.5rem;}
        .btn:hover{background:#3d3323;}
        .footer-link{text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--ink-light);}
        .footer-link a{color:var(--amber);text-decoration:none;font-weight:500;}
        .footer-link a:hover{text-decoration:underline;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo-area">
        <div class="logo-icon">
            <svg viewBox="0 0 28 28" fill="none">
                <rect x="4" y="6" width="14" height="17" rx="2" fill="#F7F3EC" opacity="0.9"/>
                <rect x="10" y="4" width="14" height="17" rx="2" fill="#F7F3EC" opacity="0.6"/>
                <rect x="5" y="7" width="12" height="2" rx="1" fill="#C97B2A"/>
                <rect x="5" y="11" width="9" height="1.5" rx="0.75" fill="#C97B2A" opacity="0.5"/>
                <rect x="5" y="14" width="11" height="1.5" rx="0.75" fill="#C97B2A" opacity="0.5"/>
            </svg>
        </div>
        <h1>Memboard</h1>
        <p>Your shared memory space</p>
    </div>
    <div class="card">
        <h2>Welcome back</h2>
        {% if form.non_field_errors %}
        <div class="error-msg">{{ form.non_field_errors.0 }}</div>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="id_email">Email address</label>
                <input type="email" id="id_email" name="email" placeholder="your@email.com"
                       value="{{ form.email.value|default:'' }}" autocomplete="email">
            </div>
            <div class="field">
                <label for="id_password">Password</label>
                <input type="password" id="id_password" name="password" placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign in</button>
        </form>
        <div class="footer-link" style="margin-top:0.75rem;">
            <a href="{% url 'password_reset' %}" style="color:var(--ink-muted);font-size:0.82rem;">Forgot password?</a>
        </div>
        <div class="footer-link">New here? <a href="{% url 'register' %}">Create an account</a></div>
    </div>
</div>
</body>
</html>
