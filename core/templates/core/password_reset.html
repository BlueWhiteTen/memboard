<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – Memboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{--cream:#F7F3EC;--warm-white:#FDFAF5;--ink:#2C2417;--ink-light:#6B5E4A;--amber:#C97B2A;--amber-pale:#F5E8D0;--border:rgba(44,36,23,0.15);}
        body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;}
        .wrap{width:100%;max-width:420px;padding:1.5rem;}
        .logo-area{text-align:center;margin-bottom:2rem;}
        .logo-area h1{font-family:'Lora',serif;font-size:1.7rem;font-weight:600;color:var(--ink);}
        .logo-area p{font-size:0.875rem;color:var(--ink-light);margin-top:0.3rem;}
        .card{background:var(--warm-white);border:1px solid var(--border);border-radius:18px;padding:2rem;box-shadow:0 2px 24px rgba(44,36,23,0.06);}
        .card h2{font-family:'Lora',serif;font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:0.5rem;}
        .card p{font-size:0.875rem;color:var(--ink-light);margin-bottom:1.5rem;}
        .field{margin-bottom:1rem;}
        .field label{display:block;font-size:0.78rem;font-weight:500;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem;}
        .field input{width:100%;height:44px;border:1px solid rgba(44,36,23,0.25);border-radius:10px;padding:0 0.9rem;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--ink);background:var(--cream);outline:none;}
        .field input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(201,123,42,0.12);}
        .btn{width:100%;height:46px;background:var(--ink);color:var(--warm-white);border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:0.5rem;}
        .btn:hover{background:#3d3323;}
        .footer-link{text-align:center;margin-top:1.25rem;font-size:0.875rem;color:var(--ink-light);}
        .footer-link a{color:var(--amber);text-decoration:none;font-weight:500;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo-area">
        <h1>Memboard</h1>
        <p>Reset your password</p>
    </div>
    <div class="card">
        <h2>Forgot your password?</h2>
        <p>Enter your email address and we'll send you a link to reset it.</p>
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="id_email">Email address</label>
                <input type="email" id="id_email" name="email" placeholder="your@email.com" autocomplete="email">
            </div>
            <button type="submit" class="btn">Send reset link</button>
        </form>
        <div class="footer-link"><a href="{% url 'login' %}">← Back to sign in</a></div>
    </div>
</div>
</body>
</html>
