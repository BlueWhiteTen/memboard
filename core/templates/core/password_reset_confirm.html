<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Set new password – Memboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}:root{--cream:#F7F3EC;--warm-white:#FDFAF5;--ink:#2C2417;--ink-light:#6B5E4A;--amber:#C97B2A;--border:rgba(44,36,23,0.15);}body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;}.wrap{max-width:420px;width:100%;padding:1.5rem;}.card{background:var(--warm-white);border:1px solid var(--border);border-radius:18px;padding:2rem;}h2{font-family:'Lora',serif;font-size:1.15rem;font-weight:600;color:var(--ink);margin-bottom:1.5rem;}.field{margin-bottom:1rem;}.field label{display:block;font-size:0.78rem;font-weight:500;color:var(--ink-light);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem;}.field input{width:100%;height:44px;border:1px solid rgba(44,36,23,0.25);border-radius:10px;padding:0 0.9rem;font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--ink);background:var(--cream);outline:none;}.field input:focus{border-color:var(--amber);}.btn{width:100%;height:46px;background:var(--ink);color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:0.95rem;cursor:pointer;margin-top:0.5rem;}.errs{background:#FCEAEA;border:1px solid #D48A8A;border-radius:8px;padding:0.6rem;margin-bottom:1rem;font-size:0.875rem;color:#6B1A1A;}</style></head>
<body><div class="wrap"><div class="card"><h2>Set a new password</h2>
{% if validlink %}
<form method="post">{% csrf_token %}
{% if form.errors %}<div class="errs">{% for e in form.errors.values %}{{ e }}{% endfor %}</div>{% endif %}
<div class="field"><label>New password</label><input type="password" name="new_password1" placeholder="••••••••"></div>
<div class="field"><label>Confirm password</label><input type="password" name="new_password2" placeholder="••••••••"></div>
<button type="submit" class="btn">Set new password</button>
</form>
{% else %}<p style="color:#c0392b;">This reset link is invalid or has expired. <a href="{% url 'password_reset' %}" style="color:var(--amber);">Request a new one</a>.</p>{% endif %}
</div></div></body></html>
