<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Password reset – Memboard</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}:root{--cream:#F7F3EC;--warm-white:#FDFAF5;--ink:#2C2417;--ink-light:#6B5E4A;--amber:#C97B2A;--border:rgba(44,36,23,0.15);}body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;}.wrap{max-width:420px;width:100%;padding:1.5rem;text-align:center;}.card{background:var(--warm-white);border:1px solid var(--border);border-radius:18px;padding:2.5rem;}.icon{font-size:3rem;margin-bottom:1rem;}h2{font-family:'Lora',serif;font-size:1.3rem;font-weight:600;color:var(--ink);margin-bottom:0.75rem;}p{font-size:0.875rem;color:var(--ink-light);}.btn{display:inline-block;margin-top:1.5rem;padding:0.65rem 1.5rem;background:var(--ink);color:white;border-radius:10px;text-decoration:none;font-size:0.9rem;}</style></head>
<body><div class="wrap"><div class="card"><div class="icon">✅</div><h2>Password updated!</h2><p>Your password has been successfully reset. You can now sign in with your new password.</p><a href="{% url 'login' %}" class="btn">Sign in</a></div></div></body></html>
